<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Block Attack</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1428;
  color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#wta-app {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* ── Grid ── */
#wta-grid-wrap {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#wta-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 3px;
  padding: 3px;
  background: #0e0b18;
}

#wta-grid.overclock {
  box-shadow: 0 0 32px #f80a, 0 0 8px #f80a;
}

.wta-cell {
  width: calc((100vh - 39px) / 12);
  height: calc((100vh - 39px) / 12);
  background: #1e1830;
  border-radius: 20%;
}

.wta-cell[data-color="1"] { background: #e05555; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="2"] { background: #4cbb5c; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="3"] { background: #4a7ee0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="4"] { background: #e0b830; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="5"] { background: #b055cc; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="6"] { background: #30b8c0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }

/* Falling blocks are rendered as overlay divs — no .falling class needed */
.wta-falling-overlay {
  position: absolute;
  pointer-events: none;
  z-index: 1;
}

/* Landing squish */
@keyframes wta-land {
  0%   { transform: scaleY(1)    scaleX(1); }
  25%  { transform: scaleY(0.65) scaleX(1.25); }
  65%  { transform: scaleY(1.08) scaleX(0.96); }
  100% { transform: scaleY(1)    scaleX(1); }
}
.wta-cell.landing { animation: wta-land 0.18s ease-out; }

/* Swap slide */
@keyframes wta-swap-from-right {
  from { transform: translateX(65%); }
  to   { transform: translateX(0); }
}
@keyframes wta-swap-from-left {
  from { transform: translateX(-65%); }
  to   { transform: translateX(0); }
}
.wta-cell.swap-from-right { animation: wta-swap-from-right 0.09s ease-out; }
.wta-cell.swap-from-left  { animation: wta-swap-from-left  0.09s ease-out; }

/* New bottom row appear */
@keyframes wta-appear {
  0%   { transform: scaleY(0.2); opacity: 0.3; }
  60%  { transform: scaleY(1.1); }
  100% { transform: scaleY(1);   opacity: 1; }
}
.wta-cell.appearing { animation: wta-appear 0.22s ease-out; }

/* Cursor overlay */
#wta-cursor {
  position: absolute;
  border: 2.5px solid rgba(255,255,255,0.9);
  border-radius: calc((100vh - 39px) / 12 * 0.2);
  pointer-events: none;
  box-sizing: border-box;
  box-shadow: 0 0 8px rgba(255,255,255,0.4);
}
#wta-cursor.hidden { display: none; }

/* Clearing flash */
@keyframes wta-flash {
  0%,100% { opacity: 1; filter: brightness(1.8) saturate(0.3); }
  50%     { opacity: 0.3; filter: brightness(0.5); }
}
.wta-cell.clearing {
  animation: wta-flash 0.2s linear infinite;
}

/* Combo rainbow border */
@keyframes wta-rainbow {
  0%   { outline-color: #f55; box-shadow: 0 0 20px #f55a; }
  17%  { outline-color: #fa5; box-shadow: 0 0 20px #fa5a; }
  33%  { outline-color: #5f5; box-shadow: 0 0 20px #5f5a; }
  50%  { outline-color: #5ff; box-shadow: 0 0 20px #5ffa; }
  67%  { outline-color: #55f; box-shadow: 0 0 20px #55fa; }
  83%  { outline-color: #f5f; box-shadow: 0 0 20px #f5fa; }
  100% { outline-color: #f55; box-shadow: 0 0 20px #f55a; }
}
#wta-grid.combo {
  outline: 3px solid #f55;
  animation: wta-rainbow var(--rainbow-period, 0.6s) linear infinite;
}

/* ── Sidebar ── */
#wta-sidebar {
  width: 160px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 100vh;
  overflow-y: auto;
  padding: 4px 0;
}

.wta-panel {
  background: #241e38;
  border-radius: 14px;
  padding: 10px 14px;
}

.wta-panel h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #7a6fa0;
  margin-bottom: 4px;
}

.wta-panel .wta-val {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.wta-panel .wta-sub {
  font-size: 10px;
  color: #5a4f78;
  margin-top: 3px;
}

#wta-pending {
  font-size: 14px;
  font-weight: 700;
  color: #f0c040;
  min-height: 1.2em;
  margin-top: 1px;
}

#wta-combo-bar-wrap {
  height: 5px;
  background: #16112a;
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}

#wta-combo-bar {
  height: 100%;
  background: linear-gradient(90deg, #5af, #a0f);
  border-radius: 99px;
  width: 0%;
  transition: width 0.1s linear;
}

#wta-abilities {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.wta-chip {
  font-size: 11px;
  padding: 4px 8px;
  background: #16112a;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #ccc;
}

.wta-alevel {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  padding: 1px 5px;
  border-radius: 5px;
}

.wta-dim { color: #4a4060; font-size: 10px; }

#wta-keys {
  font-size: 10px;
  color: #4a4060;
  line-height: 2;
}

#wta-keys b {
  color: #7a6fa0;
}

/* ── Overlay (game over / pause / pick) ── */
#wta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(14, 11, 24, 0.88);
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border-radius: 13px;
}

#wta-overlay.hidden { display: none; }

#wta-overlay h2 {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 4px;
}

.wta-go-score {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #f0c040, #f08040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.wta-overlay-hint {
  font-size: 11px;
  color: #5a4f78;
  margin-top: 4px;
}

/* Ability pick cards */
.wta-pick {
  background: #241e38;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 10px 14px;
  width: 210px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.wta-pick:hover {
  border-color: #7a6fa0;
  transform: scale(1.02);
}

.wta-pick-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.wta-pick-key {
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  background: #7a6fa0;
  border-radius: 6px;
  padding: 1px 6px;
}

.wta-pick-name {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}

.wta-pick-lvl {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  border-radius: 5px;
  padding: 1px 5px;
  margin-left: auto;
}

.wta-pick-desc {
  font-size: 11px;
  color: #7a6fa0;
  line-height: 1.4;
}
</style>
</head>
<body>
<div id="wta-app">
  <div id="wta-grid-wrap">
    <div id="wta-grid"></div>
    <div id="wta-cursor" class="hidden"></div>
    <div id="wta-overlay" class="hidden"></div>
  </div>
  <div id="wta-sidebar">
    <div class="wta-panel">
      <h3>Score</h3>
      <div class="wta-val" id="wta-score">0</div>
      <div id="wta-pending"></div>
    </div>
    <div class="wta-panel">
      <h3>Level</h3>
      <div class="wta-val" id="wta-level">1</div>
      <div class="wta-sub" id="wta-level-sub"></div>
    </div>
    <div class="wta-panel">
      <h3>Combo</h3>
      <div class="wta-val" id="wta-combo">&mdash;</div>
      <div id="wta-combo-bar-wrap"><div id="wta-combo-bar"></div></div>
    </div>
    <div class="wta-panel">
      <h3>Abilities</h3>
      <div id="wta-abilities"><span class="wta-dim">none yet</span></div>
    </div>
    <div class="wta-panel" id="wta-keys">
      <b>Arrows / WASD</b> move<br>
      <b>Z / Space</b> swap<br>
      <b>X</b> raise row<br>
      <b>P</b> pause<br>
      <b>R</b> restart
    </div>
  </div>
</div>
<script>
'use strict';

// ── src/grid.js ─────────────────────────────────────
const ROWS = 12;
const COLS = 6;
const NUM_COLORS = 6;

function createGrid() {
  return Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
}

// Generate a new row that won't immediately create a match
function generateRow(grid) {
  const row = [];
  for (let c = 0; c < COLS; c++) {
    let color, attempts = 0;
    do {
      color = Math.floor(Math.random() * NUM_COLORS) + 1;
      attempts++;
    } while (
      attempts < 20 && (
        // Prevent horizontal match in the new row
        (c >= 2 && row[c - 1] === color && row[c - 2] === color) ||
        // Prevent vertical match with existing bottom rows
        (grid[ROWS - 1]?.[c] === color && grid[ROWS - 2]?.[c] === color)
      )
    );
    row.push(color);
  }
  return row;
}

// Drop all blocks straight down to fill gaps (column by column)
function applyGravity(grid) {
  for (let c = 0; c < COLS; c++) {
    const blocks = [];
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== 0) blocks.push(grid[r][c]);
    }
    for (let r = ROWS - 1; r >= 0; r--) {
      grid[r][c] = blocks[ROWS - 1 - r] ?? 0;
    }
  }
}

// Return a Set of "r,c" keys for all cells that are part of a match (3+)
function findMatches(grid) {
  const matched = new Set();

  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const color = grid[r][c];
      if (!color) continue;
      if (grid[r][c + 1] === color && grid[r][c + 2] === color) {
        let end = c + 2;
        while (end + 1 < COLS && grid[r][end + 1] === color) end++;
        for (let i = c; i <= end; i++) matched.add(`${r},${i}`);
        c = end;
      }
    }
  }

  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const color = grid[r][c];
      if (!color) continue;
      if (grid[r + 1][c] === color && grid[r + 2][c] === color) {
        let end = r + 2;
        while (end + 1 < ROWS && grid[end + 1]?.[c] === color) end++;
        for (let i = r; i <= end; i++) matched.add(`${i},${c}`);
        r = end;
      }
    }
  }

  return matched;
}

// ── src/abilities.js ─────────────────────────────────────
function rnd(n) { return Math.floor(Math.random() * n); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rnd(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const ABILITIES = [
  // ── Passive / pickup ──────────────────────────────────────────────────────

  {
    id: 'anchor',
    name: 'Anchor',
    maxLevel: 3,
    describe: (lvl) => `Freeze cap raised to ${4 + lvl * 2}s`,
    onPick: (game) => { game.freezeCap += 2000; },
  },

  {
    id: 'frenzy',
    name: 'Frenzy',
    maxLevel: 3,
    describe: (lvl) => `Freeze active: rise ${[25, 50, 100][lvl - 1]}% slower`,
    // Passive — read by game.riseInterval getter
  },

  // ── Row-added ────────────────────────────────────────────────────────────

  {
    id: 'glacial',
    name: 'Glacial',
    maxLevel: 3,
    describe: (lvl) => `+${['0.3', '0.5', '0.8'][lvl - 1]}s freeze per new row`,
    onEvent: 'rowAdded',
    apply: (game, lvl) => {
      const bonus = [300, 500, 800][lvl - 1];
      if (game.comboStop === 0) { game.comboCount = 0; game.comboLevel = 1; }
      game.comboStop = Math.min(game.freezeCap, game.comboStop + bonus);
    },
  },

  {
    id: 'painter',
    name: 'Painter',
    maxLevel: 3,
    describe: (lvl) => [`1 matching pair in new rows`, `2 matching pairs`, `guaranteed triplet`][lvl - 1],
    onEvent: 'rowAdded',
    apply: (game, lvl) => {
      const row = game.grid[ROWS - 1];
      if (lvl >= 3) {
        const c = rnd(COLS - 2);
        const color = row[c] || rnd(6) + 1;
        row[c] = row[c + 1] = row[c + 2] = color;
      } else {
        for (let p = 0; p < lvl; p++) {
          const c = rnd(COLS - 1);
          if (row[c])     row[c + 1] = row[c];
          else if (row[c + 1]) row[c] = row[c + 1];
        }
      }
    },
  },

  // ── rainmaker is counter-based, handled in AbilityManager ──

  {
    id: 'rainmaker',
    name: 'Rainmaker',
    maxLevel: 3,
    describe: (lvl) => `Every ${[5, 3, 2][lvl - 1]} new rows: top row → one color`,
    // handled in AbilityManager._handleRainmaker()
  },

  // ── Before clear (can add to clearing set) ───────────────────────────────

  {
    id: 'echo',
    name: 'Echo',
    maxLevel: 3,
    describe: (lvl) => `${[15, 30, 50][lvl - 1]}% chance adjacent blocks join a clear`,
    onEvent: 'beforeClear',
    apply: (game, lvl) => {
      const chance = [0.15, 0.30, 0.50][lvl - 1];
      const extra = [];
      for (const key of game.clearing) {
        const [r, c] = key.split(',').map(Number);
        for (const [dr, dc] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
              game.grid[nr][nc] && !game.clearing.has(`${nr},${nc}`) &&
              Math.random() < chance) {
            extra.push(`${nr},${nc}`);
          }
        }
      }
      for (const k of extra) game.clearing.add(k);
    },
  },

  // ── After clear ───────────────────────────────────────────────────────────

  {
    id: 'magnetism',
    name: 'Magnetism',
    maxLevel: 3,
    describe: (lvl) => [`Pull 2 same-color blocks toward cursor`, `Pull 3 blocks`, `Pull whole column`][lvl - 1],
    onEvent: 'afterClear',
    apply: (game, lvl) => {
      const limit = lvl === 3 ? ROWS : lvl + 1;
      const cr = game.cursorRow, cc = game.cursorCol;
      // Find dominant color in cursor vicinity
      const freq = new Array(7).fill(0);
      for (let c = cc; c <= cc + 1; c++)
        for (let r = Math.max(0, cr - 2); r <= Math.min(ROWS - 1, cr + 2); r++)
          if (game.grid[r][c]) freq[game.grid[r][c]]++;
      const color = freq.indexOf(Math.max(...freq.slice(1)));
      if (!color) return;
      let moved = 0;
      for (let c = 0; c < COLS && moved < limit; c++) {
        for (let r = 0; r < ROWS && moved < limit; r++) {
          if (game.grid[r][c] === color && Math.abs(r - cr) > 1) {
            const dir = cr > r ? 1 : -1;
            const nr = r + dir;
            if (nr >= 0 && nr < ROWS && game.grid[nr][c] === 0) {
              game.grid[nr][c] = color;
              game.grid[r][c] = 0;
              moved++;
            }
          }
        }
      }
    },
  },

  // ── Chain-triggered ───────────────────────────────────────────────────────

  {
    id: 'aftershock',
    name: 'Aftershock',
    maxLevel: 3,
    describe: (lvl) => `On x2+ chain: destroy ${[1, 2, 3][lvl - 1]} random block${lvl > 1 ? 's' : ''}`,
    onEvent: 'chainFired',
    apply: (game, lvl, chainCount) => {
      if (chainCount < 2) return;
      const cells = [];
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (game.grid[r][c]) cells.push([r, c]);
      shuffle(cells).slice(0, lvl).forEach(([r, c]) => { game.grid[r][c] = 0; });
      applyGravity(game.grid);
    },
  },

  {
    id: 'overclock',
    name: 'Overclock',
    maxLevel: 3,
    describe: (lvl) => `On x3+ chain: score ×${[2, 3, 4][lvl - 1]} for 8s`,
    onEvent: 'chainFired',
    apply: (game, lvl, chainCount) => {
      if (chainCount < 3) return;
      game.overclockMult  = [2, 3, 4][lvl - 1];
      game.overclockTimer = 8000;
    },
  },

  // ── Panic / stack-height (tick-based, handled in AbilityManager) ──────────

  {
    id: 'panicShield',
    name: 'Panic Shield',
    maxLevel: 3,
    describe: (lvl) => `Stack >80%: auto-remove top row (${[30, 20, 10][lvl - 1]}s cd)`,
    // handled in AbilityManager.tick()
  },

  // ── Combo-ended ───────────────────────────────────────────────────────────

  {
    id: 'colorblind',
    name: 'Colorblind',
    maxLevel: 3,
    describe: (lvl) => `Combo end: unify ${[1, 2, 3][lvl - 1]} sparse column${lvl > 1 ? 's' : ''}`,
    onEvent: 'comboEnded',
    apply: (game, lvl) => {
      const byCoverage = Array.from({ length: COLS }, (_, c) => ({
        c,
        n: game.grid.reduce((s, row) => s + (row[c] ? 1 : 0), 0),
      })).sort((a, b) => a.n - b.n);

      for (let i = 0; i < Math.min(lvl, COLS); i++) {
        const col = byCoverage[i].c;
        const freq = new Array(7).fill(0);
        for (let r = 0; r < ROWS; r++) if (game.grid[r][col]) freq[game.grid[r][col]]++;
        const majority = freq.indexOf(Math.max(...freq.slice(1)));
        if (!majority) continue;
        for (let r = 0; r < ROWS; r++) if (game.grid[r][col]) game.grid[r][col] = majority;
      }
    },
  },
];

// ── src/abilityManager.js ─────────────────────────────────────
class AbilityManager {
  constructor(game) {
    this.game       = game;
    this.levels     = new Map(); // id -> current level (1-based)
    this._cooldowns = new Map(); // id -> ms remaining
    this._counters  = new Map(); // id -> counter value
  }

  level(id) { return this.levels.get(id) || 0; }

  pick(id) {
    const ability  = ABILITIES.find(a => a.id === id);
    const newLevel = this.level(id) + 1;
    this.levels.set(id, newLevel);
    ability.onPick?.(this.game, newLevel);
  }

  emit(event, ...args) {
    // Counter-based abilities handled before generic routing
    if (event === 'rowAdded')  this._handleRainmaker();

    for (const [id, level] of this.levels) {
      const ability = ABILITIES.find(a => a.id === id);
      if (ability?.onEvent === event) {
        ability.apply(this.game, level, ...args);
      }
    }
  }

  tick(dt) {
    // Decay cooldowns
    for (const [id, cd] of this._cooldowns) {
      const next = cd - dt;
      if (next <= 0) this._cooldowns.delete(id);
      else           this._cooldowns.set(id, next);
    }

    // Panic Shield: auto-remove top row when stack is critical
    const panicLvl = this.level('panicShield');
    if (panicLvl > 0 && !this._cooldowns.has('panicShield')) {
      if (this._stackHeight() / ROWS > 0.8) {
        for (let r = 0; r < ROWS; r++) {
          if (this.game.grid[r].some(v => v !== 0)) {
            this.game.grid[r].fill(0);
            break;
          }
        }
        this._cooldowns.set('panicShield', [30000, 20000, 10000][panicLvl - 1]);
      }
    }
  }

  // Return up to n ability options (unowned preferred, never max-level)
  getOptions(n = 3) {
    const available = ABILITIES.filter(a => this.level(a.id) < a.maxLevel);
    if (available.length === 0) return [];
    const unowned = available.filter(a => !this.levels.has(a.id));
    const owned   = available.filter(a =>  this.levels.has(a.id));
    // Weighted pool: prefer unowned
    const pool = shuffle([...unowned, ...unowned, ...owned]); // unowned 2× weight
    const seen = new Set();
    const result = [];
    for (const a of pool) {
      if (!seen.has(a.id)) { seen.add(a.id); result.push(a); }
      if (result.length >= n) break;
    }
    return result;
  }

  // ── Private ────────────────────────────────────────────────────────────────

  _stackHeight() {
    for (let r = 0; r < ROWS; r++)
      if (this.game.grid[r].some(v => v !== 0)) return ROWS - r;
    return 0;
  }

  _handleRainmaker() {
    const lvl = this.level('rainmaker');
    if (!lvl) return;
    const threshold = [5, 3, 2][lvl - 1];
    const count = (this._counters.get('rainmaker') || 0) + 1;
    if (count >= threshold) {
      this._counters.set('rainmaker', 0);
      const color = rnd(6) + 1;
      for (let r = 0; r < ROWS; r++) {
        if (this.game.grid[r].some(v => v !== 0)) {
          for (let c = 0; c < COLS; c++)
            if (this.game.grid[r][c]) this.game.grid[r][c] = color;
          break;
        }
      }
    } else {
      this._counters.set('rainmaker', count);
    }
  }

}

// ── src/game.js ─────────────────────────────────────
const CLEAR_DURATION   = 500;
const BASE_RISE_MS     = 4000;
const MIN_RISE_MS      = 500;
const FALL_SPEED       = 18;
const COMBO_STOP_BASE  = 1500;
const COMBO_STOP_CHAIN = 800;

// Level is derived from score: level 1 = 0–499, level 2 = 500–999, level 3 = 1000–1999, ...
// Each level threshold doubles: 500 × 2^(n-2) for n ≥ 2
function scoreToLevel(score) {
  return score < 500 ? 1 : 2 + Math.floor(Math.log2(score / 500));
}

class Game {
  constructor() {
    this.grid      = createGrid();
    this.cursorRow = Math.floor(ROWS * 0.6);
    this.cursorCol = Math.floor(COLS / 2) - 1;

    this.clearing   = new Set();
    this.clearTimer = 0;
    this.chainCount = 0;

    this.fallingBlocks  = [];
    this._fallChain     = 0;
    this._gravityDelay   = 0; // ms remaining before _startGravity fires after a swap
    this._pendingGravity = false; // swap happened during a fall; re-check gravity after

    this.riseTimer  = 0;
    this.comboStop  = 0;
    this.comboLevel = 0;
    this.comboCount = 0;

    // Ability-related state
    this.freezeCap      = 5000;
    this.overclockMult  = 1;
    this.overclockTimer = 0;

    this.score        = 0;
    this.pendingScore = 0; // accumulates during a chain, flushed to score when chain ends
    this.level = 1;
    this.time  = 0;

    this.pickOptions  = []; // array of ability objects shown during 'picking'
    this._pendingPick = false; // level-up reached mid-chain; show pick after chain ends

    // 'playing' | 'falling' | 'clearing' | 'paused' | 'picking' | 'gameOver'
    this.state = 'playing';

    this.abilities = new AbilityManager(this);

    for (let i = 0; i < Math.floor(ROWS / 2); i++) {
      this._addInitialRow();
    }
  }

  get riseInterval() {
    let base = Math.max(MIN_RISE_MS, BASE_RISE_MS - (this.level - 1) * 350);
    if (this.comboStop > 0) {
      const frenzyLvl = this.abilities.level('frenzy');
      if (frenzyLvl > 0) base *= [1.25, 1.5, 2.0][frenzyLvl - 1];
    }
    return base;
  }

  tick(dt) {
    if (this.state === 'gameOver' || this.state === 'paused' || this.state === 'picking') return;

    this.time += dt;

    // Overclock score-multiplier countdown
    if (this.overclockTimer > 0) {
      this.overclockTimer -= dt;
      if (this.overclockTimer <= 0) { this.overclockTimer = 0; this.overclockMult = 1; }
    }

    // Combo freeze countdown
    if (this.comboStop > 0) {
      this.comboStop -= dt;
      if (this.comboStop <= 0) {
        this.comboStop  = 0;
        this.comboCount = 0;
        this.comboLevel = 0;
        this.abilities.emit('comboEnded');
      }
    }

    this.abilities.tick(dt);

    // Rise is blocked while clearing, falling, or combo-frozen
    const riseBlocked = this.state === 'clearing' ||
                        this.fallingBlocks.length > 0 ||
                        this.comboStop > 0;
    if (!riseBlocked) {
      this.riseTimer += dt;
      if (this.riseTimer >= this.riseInterval) {
        this.riseTimer -= this.riseInterval;
        this._rise();
        if (this.state === 'gameOver') return;
      }
    }

    // Gravity delay: brief pause after swap so swapped position is visible before falling
    if (this._gravityDelay > 0) {
      this._gravityDelay -= dt;
      if (this._gravityDelay <= 0) {
        this._gravityDelay = 0;
        this._startGravity(0);
      }
      return;
    }

    // Animated gravity
    if (this.fallingBlocks.length > 0) {
      const rowsPerMs = FALL_SPEED / 1000;
      let anyLanded = false;
      for (const b of this.fallingBlocks) {
        b.row = Math.min(b.targetRow, b.row + rowsPerMs * dt);
        if (b.row >= b.targetRow) {
          this.grid[b.targetRow][b.col] = b.color;
          b.landed = true;
          anyLanded = true;
        }
      }
      if (anyLanded) {
        this.fallingBlocks = this.fallingBlocks.filter(b => !b.landed);
        if (this.fallingBlocks.length === 0) this._checkMatches(this._fallChain);
      }
      return;
    }

    if (this.state === 'clearing') {
      this.clearTimer -= dt;
      if (this.clearTimer <= 0) this._resolveClearing();
    }
  }

  swap() {
    if (this.state === 'gameOver' || this.state === 'paused' || this.state === 'picking') return false;

    const r = this.cursorRow, c = this.cursorCol;
    if (this.clearing.has(`${r},${c}`) || this.clearing.has(`${r},${c + 1}`)) return false;

    const tmp           = this.grid[r][c];
    this.grid[r][c]     = this.grid[r][c + 1];
    this.grid[r][c + 1] = tmp;

    this.abilities.emit('swapMade');

    if (this.state !== 'clearing' && this.fallingBlocks.length === 0) {
      this._gravityDelay = 100; // show swapped position briefly before falling
    } else if (this.fallingBlocks.length > 0) {
      this._pendingGravity = true; // re-check gravity after current fall resolves
    }
    return true;
  }

  // Called when the player presses 1/2/3 on the pick screen
  pick(choice) {
    if (this.state !== 'picking') return;
    const ability = this.pickOptions[choice];
    if (ability) this.abilities.pick(ability.id);
    this.pickOptions = [];
    this._checkLevelUp();
    if (this._pendingPick) {
      this._pendingPick = false;
      // stay in 'picking' with the new options
    } else {
      this.state = 'playing';
    }
  }

  togglePause() {
    if (this.state === 'playing') this.state = 'paused';
    else if (this.state === 'paused') this.state = 'playing';
  }

  moveLeft()  { if (this.cursorCol > 0)        this.cursorCol--; }
  moveRight() { if (this.cursorCol < COLS - 2)  this.cursorCol++; }
  moveUp()    { if (this.cursorRow > 0)         this.cursorRow--; }
  moveDown()  { if (this.cursorRow < ROWS - 1)  this.cursorRow++; }

  raise() {
    if (this.state === 'gameOver' || this.state === 'paused' || this.state === 'picking') return;
    this._rise();
  }

  // ── Private ────────────────────────────────────────────────────────────────

  _checkMatches(chainCount) {
    const matches = findMatches(this.grid);
    if (matches.size > 0) {
      this.clearing   = matches;
      this.clearTimer = CLEAR_DURATION;
      this.chainCount = chainCount;
      this.state      = 'clearing';

      // Echo: let adjacent blocks join the clearing set
      this.abilities.emit('beforeClear');

      // Notify chain-triggered abilities
      if (chainCount > 0) this.abilities.emit('chainFired', chainCount);

      // Combo session counter (manual + chains both count)
      this.comboCount++;
      this.comboLevel = this.comboCount;

      const chainMult = Math.pow(2, chainCount);
      const comboMult = this.comboCount;
      this.pendingScore += Math.floor(this.clearing.size * 10 * chainMult * comboMult * this.level * this.overclockMult);

      const freeze = (COMBO_STOP_BASE * this.comboCount + chainCount * COMBO_STOP_CHAIN) * this.level;
      this.comboStop = Math.min(this.freezeCap, Math.max(this.comboStop, freeze));
    } else {
      // Chain complete — flush pending points into score
      this.score       += this.pendingScore;
      this.pendingScore = 0;
      this.chainCount   = 0;
      this._checkLevelUp(); // sets _pendingPick if level increased
      if (this._pendingPick) {
        this._pendingPick = false;
        this.state = 'picking';
      } else if (this._pendingGravity) {
        this._pendingGravity = false;
        this._startGravity(0);
      } else {
        this.state = 'playing';
      }
    }
  }

  _resolveClearing() {
    for (const key of this.clearing) {
      const [r, c] = key.split(',').map(Number);
      this.grid[r][c] = 0;
    }
    this.clearing = new Set();
    this.abilities.emit('afterClear');
    this._startGravity(this.chainCount + 1);
  }

  _startGravity(chainAfter) {
    this._fallChain = chainAfter;
    const newFalling = [];
    for (let c = 0; c < COLS; c++) {
      const blocks = [];
      for (let r = 0; r < ROWS; r++)
        if (this.grid[r][c]) blocks.push({ color: this.grid[r][c], fromRow: r });
      for (let r = 0; r < ROWS; r++) this.grid[r][c] = 0;
      blocks.forEach((b, i) => {
        const targetRow = ROWS - blocks.length + i;
        if (targetRow !== b.fromRow) newFalling.push({ color: b.color, col: c, row: b.fromRow, targetRow });
        else this.grid[b.fromRow][c] = b.color;
      });
    }
    if (newFalling.length > 0) { this.fallingBlocks = newFalling; this.state = 'falling'; this._pendingGravity = false; }
    else this._checkMatches(chainAfter);
  }

  _rise() {
    if (this.grid[0].some(v => v !== 0)) { this.state = 'gameOver'; return; }
    for (let r = 0; r < ROWS - 1; r++) this.grid[r] = [...this.grid[r + 1]];
    this.grid[ROWS - 1] = generateRow(this.grid);
    if (this.cursorRow > 0) this.cursorRow--;
    for (const b of this.fallingBlocks) { b.row--; b.targetRow--; }
    this.fallingBlocks = this.fallingBlocks.filter(b => b.targetRow >= 0);
    this.abilities.emit('rowAdded');
  }

  _addInitialRow() {
    if (this.grid[0].some(v => v !== 0)) return;
    for (let r = 0; r < ROWS - 1; r++) this.grid[r] = [...this.grid[r + 1]];
    this.grid[ROWS - 1] = generateRow(this.grid);
  }

  _checkLevelUp() {
    const newLevel = scoreToLevel(this.score);
    if (newLevel > this.level) {
      this.level = newLevel;
      const options = this.abilities.getOptions(3);
      if (options.length > 0) {
        this.pickOptions  = options;
        this._pendingPick = true;
      }
    }
  }
}

// ── platforms/web/input.js ─────────────────────────────────────
'use strict';

const REPEAT_DELAY = 180;
const REPEAT_RATE  = 75;

const REPEATABLE = new Set([
  'ArrowLeft','ArrowRight','ArrowUp','ArrowDown',
  'a','d','w','s','x',
]);

const KEY_MAP = {
  ArrowLeft: 'left',  a: 'left',
  ArrowRight:'right', d: 'right',
  ArrowUp:   'up',    w: 'up',
  ArrowDown: 'down',  s: 'down',
  z: 'swap',  ' ': 'swap',
  x: 'raise',
  p: 'pause',
  r: 'restart',
  1: 'pick1', 2: 'pick2', 3: 'pick3',
  q: 'quit',
};

class WebInput {
  constructor() {
    this._handlers  = new Map();
    this._held      = new Map(); // key -> { since, lastRepeat }
    this._rafId     = null;
    this._onInput   = null;
  }

  on(event, fn) {
    this._handlers.set(event, fn);
  }

  start(onInput) {
    this._onInput = onInput;
    this._boundDown = e => this._onKeyDown(e);
    this._boundUp   = e => this._onKeyUp(e);
    document.addEventListener('keydown', this._boundDown);
    document.addEventListener('keyup',   this._boundUp);
    this._scheduleRepeat();
  }

  stop() {
    document.removeEventListener('keydown', this._boundDown);
    document.removeEventListener('keyup',   this._boundUp);
    cancelAnimationFrame(this._rafId);
  }

  _fire(key) {
    const event = KEY_MAP[key];
    if (!event) return;
    this._onInput(event);
  }

  _onKeyDown(e) {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))
      e.preventDefault();
    if (!this._held.has(e.key)) {
      this._held.set(e.key, { since: performance.now(), lastRepeat: performance.now() });
      this._fire(e.key);
    }
  }

  _onKeyUp(e) {
    this._held.delete(e.key);
  }

  _scheduleRepeat() {
    const tick = (now) => {
      for (const [key, info] of this._held) {
        if (REPEATABLE.has(key) &&
            now - info.since > REPEAT_DELAY &&
            now - info.lastRepeat > REPEAT_RATE) {
          info.lastRepeat = now;
          this._fire(key);
        }
      }
      this._rafId = requestAnimationFrame(tick);
    };
    this._rafId = requestAnimationFrame(tick);
  }
}

// ── platforms/web/renderer.js ─────────────────────────────────────
'use strict';

// ROWS, COLS, ABILITIES, scoreToLevel are injected by the build (concatenated from src/).

class WebRenderer {
  constructor() {
    this._cells        = [];
    this._built        = false;
    this._overlayState = null;
    this._fallingPool  = [];   // pool of overlay divs for smooth sub-row falling
    this._prevFalling  = [];   // fallingBlocks snapshot {col, targetRow} from last frame
    this._prevGrid     = null; // grid snapshot from last frame (for swap/rise detection)
    this._layout       = null; // cached {originTop, originLeft, cellH, cellW, gapH, gapW}
    this._animCls      = [];   // per-cell currently-running animation class string
  }

  _build() {
    const gridEl = document.getElementById('wta-grid');
    gridEl.innerHTML = '';
    this._cells   = [];
    this._animCls = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const div = document.createElement('div');
        div.className = 'wta-cell';
        gridEl.appendChild(div);
        this._cells.push(div);
        this._animCls.push('');
      }
    }
    this._built  = true;
    this._layout = null;
  }

  _getLayout(gridEl) {
    if (this._layout) return this._layout;
    const gridRect = gridEl.getBoundingClientRect();
    const r0 = this._cells[0].getBoundingClientRect();
    const r1 = this._cells[COLS].getBoundingClientRect();
    const c1 = this._cells[1].getBoundingClientRect();
    this._layout = {
      originTop:  r0.top  - gridRect.top,
      originLeft: r0.left - gridRect.left,
      cellH: r0.height,
      cellW: r0.width,
      gapH:  r1.top  - r0.bottom,
      gapW:  c1.left - r0.right,
    };
    return this._layout;
  }

  _borrowFallingDiv(wrap) {
    let div = this._fallingPool.find(d => !d._inUse);
    if (!div) {
      div = document.createElement('div');
      div.className = 'wta-cell wta-falling-overlay';
      wrap.appendChild(div);
      this._fallingPool.push(div);
    }
    div._inUse = true;
    return div;
  }

  render(game, now) {
    if (!this._built) this._build();

    const gridEl     = document.getElementById('wta-grid');
    const wrap       = document.getElementById('wta-grid-wrap');
    const cursorEl   = document.getElementById('wta-cursor');
    const overlayEl  = document.getElementById('wta-overlay');
    const scoreEl    = document.getElementById('wta-score');
    const levelEl    = document.getElementById('wta-level');
    const levelSubEl = document.getElementById('wta-level-sub');
    const pendingEl  = document.getElementById('wta-pending');
    const comboEl    = document.getElementById('wta-combo');
    const comboBarEl = document.getElementById('wta-combo-bar');
    const abilEl     = document.getElementById('wta-abilities');

    const layout = this._getLayout(gridEl);

    // ── Detect grid rise (all rows shifted up by 1) ──────────────────────────
    let risen = false;
    if (this._prevGrid) {
      let match = true;
      for (let r = 0; r < ROWS - 1 && match; r++)
        for (let c = 0; c < COLS && match; c++)
          if (game.grid[r][c] !== this._prevGrid[r + 1][c]) match = false;
      if (match) {
        for (let c = 0; c < COLS; c++) {
          if (game.grid[ROWS - 1][c] !== this._prevGrid[ROWS - 1][c]) { risen = true; break; }
        }
      }
    }

    // ── Detect swaps (adjacent cells that exchanged values) ──────────────────
    const swapAnim = {}; // "r,c" → 'from-right' | 'from-left'
    if (this._prevGrid && !risen) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS - 1; c++) {
          const pA = this._prevGrid[r][c], pB = this._prevGrid[r][c + 1];
          const cA = game.grid[r][c],      cB = game.grid[r][c + 1];
          if (pA !== cA && pB !== cB && pA === cB && pB === cA) {
            swapAnim[`${r},${c}`]     = 'from-right'; // new block came from the right
            swapAnim[`${r},${c + 1}`] = 'from-left';  // new block came from the left
          }
        }
      }
    }

    // ── Detect landings ──────────────────────────────────────────────────────
    // A block "landed" if it was in _prevFalling but is no longer in fallingBlocks.
    // Skip blocks whose targetRow < 0 — those were removed by _rise(), not by landing.
    const nowFallingKeys = new Set(game.fallingBlocks.map(b => `${b.col},${b.targetRow}`));
    const justLanded = new Set(); // "row,col"
    for (const b of this._prevFalling) {
      if (b.targetRow >= 0 && !nowFallingKeys.has(`${b.col},${b.targetRow}`))
        justLanded.add(`${b.targetRow},${b.col}`);
    }

    // ── New bottom row cells appear on rise ──────────────────────────────────
    const newBottomCells = new Set();
    if (risen) {
      for (let c = 0; c < COLS; c++)
        if (game.grid[ROWS - 1][c] !== 0) newBottomCells.add(`${ROWS - 1},${c}`);
    }

    // ── Falling block overlay divs (smooth sub-row positioning) ──────────────
    for (const d of this._fallingPool) d._inUse = false;
    const fallingCells = new Set(); // "row,col" keys obscured by an overlay div

    for (const b of game.fallingBlocks) {
      if (b.row < 0) continue;
      const div  = this._borrowFallingDiv(wrap);
      div.dataset.color = b.color;
      const top  = layout.originTop  + b.row * (layout.cellH + layout.gapH);
      const left = layout.originLeft + b.col * (layout.cellW + layout.gapW);
      div.style.cssText = `top:${top}px;left:${left}px;width:${layout.cellW}px;height:${layout.cellH}px;display:block`;
      const roundRow = Math.min(ROWS - 1, Math.round(b.row));
      if (roundRow >= 0) fallingCells.add(`${roundRow},${b.col}`);
    }
    for (const d of this._fallingPool) if (!d._inUse) d.style.display = 'none';

    // ── Grid cells ───────────────────────────────────────────────────────────
    // Animation strategy: set base className in the first pass, then after a single
    // forced reflow, add animation classes. This allows CSS animations to restart
    // cleanly. Running animations are maintained by re-including their class each frame
    // (setting the same animation class again does NOT restart the animation).
    const animNeeded = []; // [{idx, cls}] — cells starting a new animation this frame

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        const div = this._cells[idx];
        const key = `${r},${c}`;
        const color      = fallingCells.has(key) ? 0 : game.grid[r][c];
        const isClearing = game.clearing.has(key);

        div.dataset.color = color || '';

        // Determine if a new animation should start (clearing cells: no anim, their flash wins)
        let newAnim = '';
        if (!isClearing) {
          if (swapAnim[key] && color !== 0)             newAnim = `swap-${swapAnim[key]}`;
          else if (justLanded.has(key) && color !== 0)  newAnim = 'landing';
          else if (newBottomCells.has(key))             newAnim = 'appearing';
        }

        // If the cell is clearing, kill any existing animation to avoid CSS conflict
        const existingAnim = isClearing ? '' : this._animCls[idx];
        if (isClearing && this._animCls[idx]) this._animCls[idx] = '';

        if (newAnim) {
          // Set base class now; animation class added after reflow below
          div.className = 'wta-cell' + (isClearing ? ' clearing' : '');
          animNeeded.push({ idx, cls: newAnim });
        } else {
          // Maintain existing running animation (re-adding same class doesn't restart it)
          div.className = 'wta-cell' + (isClearing ? ' clearing' : '') + (existingAnim ? ' ' + existingAnim : '');
        }
      }
    }

    // Single forced reflow, then add all new animation classes
    if (animNeeded.length > 0) {
      void this._cells[0].offsetWidth;
      for (const { idx, cls } of animNeeded) {
        this._cells[idx].classList.add(cls);
        this._animCls[idx] = cls;
        const capturedIdx = idx, capturedCls = cls;
        this._cells[idx].addEventListener('animationend', () => {
          if (this._animCls[capturedIdx] === capturedCls) this._animCls[capturedIdx] = '';
        }, { once: true });
      }
    }

    // ── Cursor ───────────────────────────────────────────────────────────────
    const showCursor = game.state !== 'picking' && game.state !== 'gameOver';
    const cr = game.cursorRow, cc = game.cursorCol;
    if (showCursor) {
      const c0 = this._cells[cr * COLS + cc];
      const c1 = this._cells[cr * COLS + cc + 1];
      const gridRect = gridEl.getBoundingClientRect();
      const b0 = c0.getBoundingClientRect();
      const b1 = c1.getBoundingClientRect();
      cursorEl.style.left   = (b0.left - gridRect.left) + 'px';
      cursorEl.style.top    = (b0.top  - gridRect.top)  + 'px';
      cursorEl.style.width  = (b1.right - b0.left) + 'px';
      cursorEl.style.height = b0.height + 'px';
      cursorEl.classList.remove('hidden');
    } else {
      cursorEl.classList.add('hidden');
    }

    gridEl.classList.toggle('overclock', game.overclockMult > 1);

    if (game.comboStop > 0) {
      const period = Math.max(75, 600 / Math.pow(2, game.comboLevel - 1));
      gridEl.style.setProperty('--rainbow-period', (period * 6 / 1000).toFixed(3) + 's');
      gridEl.classList.add('combo');
    } else {
      gridEl.classList.remove('combo');
    }

    // Score / level
    scoreEl.textContent = game.score;
    pendingEl.textContent = game.pendingScore > 0 ? `+${game.pendingScore}` : '';
    levelEl.textContent = game.level;
    const nextLevelScore = Math.round(500 * Math.pow(2, game.level - 1));
    levelSubEl.textContent = `next level: ${nextLevelScore}`;

    // Combo bar
    if (game.comboStop > 0) {
      comboEl.textContent = `\u00d7${game.comboCount}`;
      const pct = Math.min(100, (game.comboStop / game.freezeCap) * 100);
      comboBarEl.style.width = pct + '%';
      comboBarEl.style.background = game.comboCount >= 4 ? '#f84' : '#5af';
    } else {
      comboEl.textContent = '\u2014';
      comboBarEl.style.width = '0%';
    }

    // Abilities
    const entries = [...game.abilities.levels.entries()];
    if (entries.length === 0) {
      abilEl.innerHTML = '<span class="wta-dim">none yet</span>';
    } else {
      abilEl.innerHTML = entries.map(([id, lvl]) => {
        const ab = ABILITIES.find(a => a.id === id);
        return `<div class="wta-chip"><span>${ab.name}</span><span class="wta-alevel">Lv${lvl}</span></div>`;
      }).join('');
    }

    // Overlay — only rebuild DOM when state changes to avoid destroying elements mid-click
    const overlayKey = game.state === 'gameOver' ? `gameover:${game.score}` : game.state;
    if (overlayKey !== this._overlayState) {
      this._overlayState = overlayKey;

      if (game.state === 'gameOver') {
        overlayEl.classList.remove('hidden');
        overlayEl.innerHTML = `
          <h2>Game Over</h2>
          <div class="wta-go-score">${game.score}</div>
          <div class="wta-overlay-hint">press R to restart</div>`;
      } else if (game.state === 'paused') {
        overlayEl.classList.remove('hidden');
        overlayEl.innerHTML = `<h2>Paused</h2><div class="wta-overlay-hint">press P to resume</div>`;
      } else if (game.state === 'picking') {
        overlayEl.classList.remove('hidden');
        const opts = game.pickOptions.map((ab, i) => {
          const nextLvl = game.abilities.level(ab.id) + 1;
          const owned   = game.abilities.level(ab.id) > 0;
          return `<div class="wta-pick" data-choice="${i}">
            <div class="wta-pick-header">
              <span class="wta-pick-key">${i + 1}</span>
              <span class="wta-pick-name">${ab.name}</span>
              ${owned ? `<span class="wta-pick-lvl">Lv ${nextLvl}</span>` : ''}
            </div>
            <div class="wta-pick-desc">${ab.describe(nextLvl)}</div>
          </div>`;
        }).join('');
        overlayEl.innerHTML = `<h2>Choose Ability</h2>${opts}`;
        overlayEl.querySelectorAll('.wta-pick').forEach(el => {
          el.addEventListener('mousedown', () => {
            game.pick(parseInt(el.dataset.choice));
          });
        });
      } else {
        overlayEl.classList.add('hidden');
      }
    }

    // ── Save state for next frame ────────────────────────────────────────────
    this._prevGrid    = game.grid.map(row => [...row]);
    this._prevFalling = game.fallingBlocks.map(b => ({ col: b.col, targetRow: b.targetRow }));
  }

  reset() {
    this._overlayState = null;
    this._prevGrid     = null;
    this._prevFalling  = [];
    this._layout       = null;
    for (let i = 0; i < this._animCls.length; i++) this._animCls[i] = '';
  }
}

// ── platforms/web/index.js ─────────────────────────────────────
'use strict';


class WebPlatform {
  constructor() {
    this._input    = new WebInput();
    this._renderer = new WebRenderer();
  }

  init(onInput) {
    this._input.start(onInput);
  }

  render(game, now) {
    this._renderer.render(game, now);
  }

  reset() {
    this._renderer.reset();
  }

  destroy() {
    this._input.stop();
  }
}

// ── src/engine.js ─────────────────────────────────────
const FPS        = 30;
const FRAME_TIME = Math.floor(1000 / FPS);

const INPUT_HANDLERS = {
  left:  g => g.moveLeft(),
  right: g => g.moveRight(),
  up:    g => g.moveUp(),
  down:  g => g.moveDown(),
  swap:  g => g.swap(),
  raise: g => g.raise(),
  pick1: g => g.pick(0),
  pick2: g => g.pick(1),
  pick3: g => g.pick(2),
  pause: g => g.togglePause(),
};

class Engine {
  constructor(platform) {
    this._platform = platform;
    this._game     = null;
    this._loop     = null;
    this._lastTime = 0;
  }

  start() {
    this._newGame();
    this._platform.init(event => this._handleInput(event));
    this._lastTime = Date.now();
    this._loop = setInterval(() => this._tick(), FRAME_TIME);
  }

  stop() {
    clearInterval(this._loop);
    this._loop = null;
    this._platform.destroy();
  }

  _newGame() {
    this._game = new Game();
    if (this._platform.reset) this._platform.reset();
  }

  _tick() {
    const now = Date.now();
    this._game.tick(now - this._lastTime);
    this._lastTime = now;
    this._platform.render(this._game, now);
  }

  _handleInput(event) {
    if (event === 'quit')    { this.stop(); return; }
    if (event === 'restart') { this._newGame(); return; }
    INPUT_HANDLERS[event]?.(this._game);
  }
}

new Engine(new WebPlatform()).start();
</script>
