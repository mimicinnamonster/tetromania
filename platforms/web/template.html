<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tetromania</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1428;
  color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  touch-action: none;
}

#wta-app {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* ── Grid ── */
#wta-grid-wrap {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#wta-grid {
  display: grid;
  /* gridTemplateColumns set by renderer._build() */
  gap: 3px;
  padding: 3px;
  background: #0e0b18;
}

#wta-grid.overclock {
  box-shadow: 0 0 32px #f80a, 0 0 8px #f80a;
}

.wta-cell {
  width: calc((100vh - 39px) / 12);
  height: calc((100vh - 39px) / 12);
  background: #1e1830;
  border-radius: 20%;
}

.wta-cell[data-color="1"] { background: #e05555; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="2"] { background: #4cbb5c; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="3"] { background: #4a7ee0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="4"] { background: #e0b830; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="5"] { background: #b055cc; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="6"] { background: #30b8c0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }

/* Falling blocks are rendered as overlay divs — no .falling class needed */
.wta-falling-overlay {
  position: absolute;
  pointer-events: none;
  z-index: 1;
}

/* Landing squish */
@keyframes wta-land {
  0%   { transform: scaleY(1)    scaleX(1); }
  25%  { transform: scaleY(0.65) scaleX(1.25); }
  65%  { transform: scaleY(1.08) scaleX(0.96); }
  100% { transform: scaleY(1)    scaleX(1); }
}
.wta-cell.landing { animation: wta-land 0.18s ease-out; }

/* Swap slide */
@keyframes wta-swap-from-right {
  from { transform: translateX(65%); }
  to   { transform: translateX(0); }
}
@keyframes wta-swap-from-left {
  from { transform: translateX(-65%); }
  to   { transform: translateX(0); }
}
.wta-cell.swap-from-right { animation: wta-swap-from-right 0.09s ease-out; }
.wta-cell.swap-from-left  { animation: wta-swap-from-left  0.09s ease-out; }

/* New bottom row appear */
@keyframes wta-appear {
  0%   { transform: scaleY(0.2); opacity: 0.3; }
  60%  { transform: scaleY(1.1); }
  100% { transform: scaleY(1);   opacity: 1; }
}
.wta-cell.appearing { animation: wta-appear 0.22s ease-out; }

/* Cursor overlay */
#wta-cursor {
  position: absolute;
  border: 2.5px solid rgba(255,255,255,0.9);
  border-radius: calc((100vh - 39px) / 12 * 0.2);
  pointer-events: none;
  box-sizing: border-box;
  box-shadow: 0 0 8px rgba(255,255,255,0.4);
}
#wta-cursor.hidden { display: none; }

/* Clearing flash */
@keyframes wta-flash {
  0%,100% { opacity: 1; filter: brightness(1.8) saturate(0.3); }
  50%     { opacity: 0.3; filter: brightness(0.5); }
}
.wta-cell.clearing {
  animation: wta-flash 0.2s linear infinite;
}

/* Combo rainbow border */
@keyframes wta-rainbow {
  0%   { outline-color: #f55; box-shadow: 0 0 20px #f55a; }
  17%  { outline-color: #fa5; box-shadow: 0 0 20px #fa5a; }
  33%  { outline-color: #5f5; box-shadow: 0 0 20px #5f5a; }
  50%  { outline-color: #5ff; box-shadow: 0 0 20px #5ffa; }
  67%  { outline-color: #55f; box-shadow: 0 0 20px #55fa; }
  83%  { outline-color: #f5f; box-shadow: 0 0 20px #f5fa; }
  100% { outline-color: #f55; box-shadow: 0 0 20px #f55a; }
}
#wta-grid.combo {
  outline: 3px solid #f55;
  animation: wta-rainbow var(--rainbow-period, 0.6s) linear infinite;
}

/* ── Sidebar ── */
#wta-sidebar {
  width: 160px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 100vh;
  overflow-y: auto;
  padding: 4px 0;
}

.wta-panel {
  background: #241e38;
  border-radius: 14px;
  padding: 10px 14px;
}

.wta-panel h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #7a6fa0;
  margin-bottom: 4px;
}

.wta-panel .wta-val {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.wta-panel .wta-sub {
  font-size: 10px;
  color: #5a4f78;
  margin-top: 3px;
}

#wta-pending {
  font-size: 14px;
  font-weight: 700;
  color: #f0c040;
  min-height: 1.2em;
  margin-top: 1px;
}

.wta-combo-bar-wrap, #wta-combo-bar-wrap {
  height: 5px;
  background: #16112a;
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}

.wta-combo-bar-inner, #wta-combo-bar {
  height: 100%;
  background: linear-gradient(90deg, #5af, #a0f);
  border-radius: 99px;
  width: 0%;
  transition: width 0.1s linear;
}

#wta-abilities {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.wta-chip {
  font-size: 11px;
  padding: 4px 8px;
  background: #16112a;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #ccc;
}

.wta-alevel {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  padding: 1px 5px;
  border-radius: 5px;
}

.wta-dim { color: #4a4060; font-size: 10px; }

#wta-keys {
  font-size: 10px;
  color: #4a4060;
  line-height: 2;
}

#wta-keys b {
  color: #7a6fa0;
}

/* ── Overlay (game over / pause / pick) ── */
#wta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(14, 11, 24, 0.88);
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border-radius: 13px;
}

#wta-overlay.hidden { display: none; }

#wta-overlay h2 {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 4px;
}

.wta-go-score {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #f0c040, #f08040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.wta-overlay-hint {
  font-size: 11px;
  color: #5a4f78;
  margin-top: 4px;
}

/* Ability pick cards */
.wta-pick {
  background: #241e38;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 10px 14px;
  width: 210px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.wta-pick:hover {
  border-color: #7a6fa0;
  transform: scale(1.02);
}

.wta-pick-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.wta-pick-key {
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  background: #7a6fa0;
  border-radius: 6px;
  padding: 1px 6px;
}

.wta-pick-name {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}

.wta-pick-lvl {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  border-radius: 5px;
  padding: 1px 5px;
  margin-left: auto;
}

.wta-pick-desc {
  font-size: 11px;
  color: #7a6fa0;
  line-height: 1.4;
}

/* ── Mobile touch controls (hidden on desktop) ── */
#wta-topbar { display: none; }
#wta-touch-controls { display: none; }

/* ── Mobile layout ── */
@media (max-width: 600px), (pointer: coarse) and (max-width: 900px) {
  body {
    align-items: flex-start;
    height: 100dvh;
    overflow: hidden;
  }

  #wta-app {
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    width: 100%;
    height: 100dvh;
    padding: 0;
  }

  /* Hide desktop sidebar */
  #wta-sidebar { display: none; }

  /* Top stats bar */
  #wta-topbar {
    display: flex;
    flex-shrink: 0;
    gap: 6px;
    padding: 6px 8px 4px;
    background: #1a1428;
    align-items: center;
  }

  .wta-stat-block {
    background: #241e38;
    border-radius: 10px;
    padding: 5px 10px;
    min-width: 0;
    flex: 1;
  }

  .wta-stat-block h3 {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7a6fa0;
    margin-bottom: 1px;
  }

  .wta-stat-block .wta-val {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
  }

  #wta-topbar #wta-pending {
    font-size: 11px;
    font-weight: 700;
    color: #f0c040;
    min-height: 0;
    margin-top: 0;
    display: inline;
  }

  #wta-topbar #wta-combo-bar-wrap {
    height: 3px;
    background: #16112a;
    border-radius: 99px;
    margin-top: 4px;
    overflow: hidden;
  }

  #wta-topbar #wta-combo-bar {
    height: 100%;
    background: linear-gradient(90deg, #5af, #a0f);
    border-radius: 99px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Abilities as horizontal chips in topbar */
  #wta-topbar-abilities {
    flex: 2;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    align-items: center;
    min-width: 0;
    overflow: hidden;
  }

  .wta-chip-sm {
    font-size: 10px;
    padding: 2px 6px;
    background: #16112a;
    border-radius: 6px;
    color: #ccc;
    white-space: nowrap;
  }

  /* Grid fills remaining space */
  #wta-grid-wrap {
    flex: 1 1 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
  }

  #wta-grid {
    /* Cell size based on available space: min of width-based and height-based */
    --cell: min(
      calc((100vw - 20px) / 4),
      calc((100dvh - 68px - 150px - 11px * 3) / 12)
    );
    gap: 3px;
    padding: 3px;
  }

  .wta-cell {
    width: var(--cell);
    height: var(--cell);
  }

  /* Touch controls at the bottom */
  #wta-touch-controls {
    display: flex;
    flex-shrink: 0;
    flex-direction: column;
    gap: 6px;
    padding: 6px 12px 10px;
    background: #1a1428;
    align-items: center;
  }

  #wta-dpad-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #wta-action-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .wta-btn {
    background: #241e38;
    border: none;
    border-radius: 12px;
    color: #eee;
    font-size: 18px;
    font-weight: 700;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    box-shadow: 0 3px 0 #14102a;
  }

  .wta-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #14102a;
  }

  .wta-btn-swap {
    background: #3a2a60;
    width: 72px;
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  .wta-btn-raise {
    background: #1e3020;
    font-size: 14px;
  }

  .wta-btn-sm {
    width: 40px;
    height: 40px;
    font-size: 14px;
    border-radius: 9px;
  }

  /* Overlay wider on mobile for pick cards */
  .wta-pick {
    width: calc(100vw - 48px);
    max-width: 320px;
  }
}
</style>
</head>
<body>
<div id="wta-app">

  <!-- Mobile top stats bar (hidden on desktop) -->
  <div id="wta-topbar">
    <div class="wta-stat-block">
      <h3>Score</h3>
      <div class="wta-val" id="wta-score-m">0</div>
      <div id="wta-pending"></div>
    </div>
    <div class="wta-stat-block">
      <h3>Level</h3>
      <div class="wta-val" id="wta-level-m">1</div>
    </div>
    <div class="wta-stat-block">
      <h3>Combo</h3>
      <div class="wta-val" id="wta-combo-m">&mdash;</div>
      <div id="wta-combo-bar-wrap"><div id="wta-combo-bar"></div></div>
    </div>
    <div id="wta-topbar-abilities"><span class="wta-dim" id="wta-abilities-m">—</span></div>
  </div>

  <!-- Grid -->
  <div id="wta-grid-wrap">
    <div id="wta-grid"></div>
    <div id="wta-cursor" class="hidden"></div>
    <div id="wta-overlay" class="hidden"></div>
  </div>

  <!-- Desktop sidebar -->
  <div id="wta-sidebar">
    <div class="wta-panel">
      <h3>Score</h3>
      <div class="wta-val" id="wta-score">0</div>
      <div id="wta-pending-d" style="font-size:14px;font-weight:700;color:#f0c040;min-height:1.2em;margin-top:1px"></div>
    </div>
    <div class="wta-panel">
      <h3>Level</h3>
      <div class="wta-val" id="wta-level">1</div>
      <div class="wta-sub" id="wta-level-sub"></div>
    </div>
    <div class="wta-panel">
      <h3>Combo</h3>
      <div class="wta-val" id="wta-combo">&mdash;</div>
      <div class="wta-combo-bar-wrap" id="wta-combo-bar-wrap-d"><div class="wta-combo-bar-inner" id="wta-combo-bar-d"></div></div>
    </div>
    <div class="wta-panel">
      <h3>Abilities</h3>
      <div id="wta-abilities"><span class="wta-dim">none yet</span></div>
    </div>
    <div class="wta-panel" id="wta-keys">
      <b>Arrows / WASD</b> move<br>
      <b>Z / Space</b> swap<br>
      <b>X</b> raise row<br>
      <b>P</b> pause<br>
      <b>R</b> restart
    </div>
  </div>

  <!-- Mobile touch controls (hidden on desktop) -->
  <div id="wta-touch-controls">
    <div id="wta-dpad-row">
      <button class="wta-btn" id="wta-btn-left">&#8592;</button>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="wta-btn" id="wta-btn-up">&#8593;</button>
        <button class="wta-btn" id="wta-btn-down">&#8595;</button>
      </div>
      <button class="wta-btn" id="wta-btn-right">&#8594;</button>
      <button class="wta-btn wta-btn-swap" id="wta-btn-swap">SWAP</button>
      <button class="wta-btn wta-btn-raise" id="wta-btn-raise">&#9650;</button>
    </div>
    <div id="wta-action-row">
      <button class="wta-btn wta-btn-sm" id="wta-btn-pause">&#9646;&#9646;</button>
      <button class="wta-btn wta-btn-sm" id="wta-btn-restart">&#8635;</button>
    </div>
  </div>

</div>
<script>
const _GAME_COLS = (window.innerWidth < 600 || (window.matchMedia('(pointer: coarse)').matches && window.innerWidth < 900)) ? 4 : 6;
</script>
<script>
{{SCRIPT}}
new Engine(new WebPlatform()).start();
</script>
</body>
</html>
