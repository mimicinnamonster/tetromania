<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Block Attack</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1428;
  color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#wta-app {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* ── Grid ── */
#wta-grid-wrap {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#wta-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 3px;
  padding: 3px;
  background: #0e0b18;
}

#wta-grid.overclock {
  box-shadow: 0 0 32px #f80a, 0 0 8px #f80a;
}

.wta-cell {
  width: calc((100vh - 39px) / 12);
  height: calc((100vh - 39px) / 12);
  background: #1e1830;
  border-radius: 20%;
}

.wta-cell[data-color="1"] { background: #e05555; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="2"] { background: #4cbb5c; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="3"] { background: #4a7ee0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="4"] { background: #e0b830; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="5"] { background: #b055cc; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="6"] { background: #30b8c0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }

.wta-cell.falling[data-color="1"] { background: #f07070; box-shadow: inset 0 2px 0 rgba(255,255,255,0.3); }
.wta-cell.falling[data-color="2"] { background: #6ed87e; box-shadow: inset 0 2px 0 rgba(255,255,255,0.3); }
.wta-cell.falling[data-color="3"] { background: #6898f0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.3); }
.wta-cell.falling[data-color="4"] { background: #f0d050; box-shadow: inset 0 2px 0 rgba(255,255,255,0.3); }
.wta-cell.falling[data-color="5"] { background: #cc70e0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.3); }
.wta-cell.falling[data-color="6"] { background: #50d0d8; box-shadow: inset 0 2px 0 rgba(255,255,255,0.3); }

/* Cursor overlay */
#wta-cursor {
  position: absolute;
  border: 2.5px solid rgba(255,255,255,0.9);
  border-radius: calc((100vh - 39px) / 12 * 0.2);
  pointer-events: none;
  box-sizing: border-box;
  box-shadow: 0 0 8px rgba(255,255,255,0.4);
}
#wta-cursor.hidden { display: none; }

/* Clearing flash */
@keyframes wta-flash {
  0%,100% { opacity: 1; filter: brightness(1.8) saturate(0.3); }
  50%     { opacity: 0.3; filter: brightness(0.5); }
}
.wta-cell.clearing {
  animation: wta-flash 0.2s linear infinite;
}

/* Combo rainbow border */
@keyframes wta-rainbow {
  0%   { outline-color: #f55; box-shadow: 0 0 20px #f55a; }
  17%  { outline-color: #fa5; box-shadow: 0 0 20px #fa5a; }
  33%  { outline-color: #5f5; box-shadow: 0 0 20px #5f5a; }
  50%  { outline-color: #5ff; box-shadow: 0 0 20px #5ffa; }
  67%  { outline-color: #55f; box-shadow: 0 0 20px #55fa; }
  83%  { outline-color: #f5f; box-shadow: 0 0 20px #f5fa; }
  100% { outline-color: #f55; box-shadow: 0 0 20px #f55a; }
}
#wta-grid.combo {
  outline: 3px solid #f55;
  animation: wta-rainbow var(--rainbow-period, 0.6s) linear infinite;
}

/* ── Sidebar ── */
#wta-sidebar {
  width: 160px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 100vh;
  overflow-y: auto;
  padding: 4px 0;
}

.wta-panel {
  background: #241e38;
  border-radius: 14px;
  padding: 10px 14px;
}

.wta-panel h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #7a6fa0;
  margin-bottom: 4px;
}

.wta-panel .wta-val {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.wta-panel .wta-sub {
  font-size: 10px;
  color: #5a4f78;
  margin-top: 3px;
}

#wta-pending {
  font-size: 14px;
  font-weight: 700;
  color: #f0c040;
  min-height: 1.2em;
  margin-top: 1px;
}

#wta-combo-bar-wrap {
  height: 5px;
  background: #16112a;
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}

#wta-combo-bar {
  height: 100%;
  background: linear-gradient(90deg, #5af, #a0f);
  border-radius: 99px;
  width: 0%;
  transition: width 0.1s linear;
}

#wta-abilities {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.wta-chip {
  font-size: 11px;
  padding: 4px 8px;
  background: #16112a;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #ccc;
}

.wta-alevel {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  padding: 1px 5px;
  border-radius: 5px;
}

.wta-dim { color: #4a4060; font-size: 10px; }

#wta-keys {
  font-size: 10px;
  color: #4a4060;
  line-height: 2;
}

#wta-keys b {
  color: #7a6fa0;
}

/* ── Overlay (game over / pause / pick) ── */
#wta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(14, 11, 24, 0.88);
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border-radius: 13px;
}

#wta-overlay.hidden { display: none; }

#wta-overlay h2 {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 4px;
}

.wta-go-score {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #f0c040, #f08040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.wta-overlay-hint {
  font-size: 11px;
  color: #5a4f78;
  margin-top: 4px;
}

/* Ability pick cards */
.wta-pick {
  background: #241e38;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 10px 14px;
  width: 210px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.wta-pick:hover {
  border-color: #7a6fa0;
  transform: scale(1.02);
}

.wta-pick-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.wta-pick-key {
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  background: #7a6fa0;
  border-radius: 6px;
  padding: 1px 6px;
}

.wta-pick-name {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}

.wta-pick-lvl {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  border-radius: 5px;
  padding: 1px 5px;
  margin-left: auto;
}

.wta-pick-desc {
  font-size: 11px;
  color: #7a6fa0;
  line-height: 1.4;
}
</style>
</head>
<body>
<div id="wta-app">
  <div id="wta-grid-wrap">
    <div id="wta-grid"></div>
    <div id="wta-cursor" class="hidden"></div>
    <div id="wta-overlay" class="hidden"></div>
  </div>
  <div id="wta-sidebar">
    <div class="wta-panel">
      <h3>Score</h3>
      <div class="wta-val" id="wta-score">0</div>
      <div id="wta-pending"></div>
    </div>
    <div class="wta-panel">
      <h3>Level</h3>
      <div class="wta-val" id="wta-level">1</div>
      <div class="wta-sub" id="wta-level-sub"></div>
    </div>
    <div class="wta-panel">
      <h3>Combo</h3>
      <div class="wta-val" id="wta-combo">&mdash;</div>
      <div id="wta-combo-bar-wrap"><div id="wta-combo-bar"></div></div>
    </div>
    <div class="wta-panel">
      <h3>Abilities</h3>
      <div id="wta-abilities"><span class="wta-dim">none yet</span></div>
    </div>
    <div class="wta-panel" id="wta-keys">
      <b>Arrows / WASD</b> move<br>
      <b>Z / Space</b> swap<br>
      <b>X</b> raise row<br>
      <b>P</b> pause<br>
      <b>R</b> restart
    </div>
  </div>
</div>
<script>
{{SCRIPT}}
new Engine(new WebPlatform()).start();
</script>
</body>
</html>
