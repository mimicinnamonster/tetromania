<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tetromania</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1428;
  color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  touch-action: none;
}

#wta-app {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* ── Grid ── */
#wta-grid-wrap {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#wta-grid {
  display: grid;
  /* gridTemplateColumns + gridTemplateRows set by renderer._build() */
  gap: 3px;
  padding: 3px;
  background: #0e0b18;
}

#wta-grid.overclock {
  box-shadow: 0 0 32px #f80a, 0 0 8px #f80a;
}

.wta-cell {
  width: calc((100dvh - 55px) / 12);
  height: calc((100dvh - 55px) / 12);
  background: #1e1830;
  border-radius: 20%;
}

.wta-cell[data-color="1"] { background: #e05555; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="2"] { background: #4cbb5c; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="3"] { background: #4a7ee0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="4"] { background: #e0b830; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="5"] { background: #b055cc; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }
.wta-cell[data-color="6"] { background: #30b8c0; box-shadow: inset 0 2px 0 rgba(255,255,255,0.25); }

/* Falling blocks overlay */
.wta-falling-overlay {
  position: absolute;
  pointer-events: none;
  z-index: 1;
}

/* Landing squish */
@keyframes wta-land {
  0%   { transform: scaleY(1)    scaleX(1); }
  25%  { transform: scaleY(0.65) scaleX(1.25); }
  65%  { transform: scaleY(1.08) scaleX(0.96); }
  100% { transform: scaleY(1)    scaleX(1); }
}
.wta-cell.landing { animation: wta-land 0.18s ease-out; }

/* Swap slide */
@keyframes wta-swap-from-right {
  from { transform: translateX(65%); }
  to   { transform: translateX(0); }
}
@keyframes wta-swap-from-left {
  from { transform: translateX(-65%); }
  to   { transform: translateX(0); }
}
.wta-cell.swap-from-right { animation: wta-swap-from-right 0.09s ease-out; }
.wta-cell.swap-from-left  { animation: wta-swap-from-left  0.09s ease-out; }

/* New bottom row appear */
@keyframes wta-appear {
  0%   { transform: scaleY(0.2); opacity: 0.3; }
  60%  { transform: scaleY(1.1); }
  100% { transform: scaleY(1);   opacity: 1; }
}
.wta-cell.appearing { animation: wta-appear 0.22s ease-out; }

/* Cursor overlay */
#wta-cursor {
  position: absolute;
  border: 2.5px solid rgba(255,255,255,0.9);
  border-radius: calc((100dvh - 55px) / 12 * 0.2);
  pointer-events: none;
  box-sizing: border-box;
  box-shadow: 0 0 8px rgba(255,255,255,0.4);
}
#wta-cursor.hidden { display: none; }

/* Clearing flash */
@keyframes wta-flash {
  0%,100% { opacity: 1; filter: brightness(1.8) saturate(0.3); }
  50%     { opacity: 0.3; filter: brightness(0.5); }
}
.wta-cell.clearing {
  animation: wta-flash 0.2s linear infinite;
}

/* Combo rainbow — color driven by JS via --combo-color / --combo-color-a */
#wta-grid-frame::after {
  content: '';
  position: absolute;
  inset: calc(-1 * var(--combo-border, 3px));
  border-radius: 19px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  box-shadow: 0 0 0 var(--combo-border, 3px) var(--combo-color, #f55),
              0 0 var(--combo-glow, 24px) var(--combo-color-a, #f55a);
}
#wta-grid-frame.combo::after {
  opacity: 1;
}
.wta-combo-rainbow {
  color: var(--combo-color, #f55) !important;
  text-shadow: 0 0 var(--combo-glow-text, 8px) var(--combo-color-a, #f55a);
}
#wta-grid-frame {
  position: relative;
  border-radius: 18px;
}

/* ── Desktop Sidebar ── */
#wta-sidebar {
  width: 160px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 100dvh;
  overflow-y: auto;
  padding: 4px 0;
}

.wta-panel {
  background: #241e38;
  border-radius: 14px;
  padding: 10px 14px;
}

.wta-panel h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #7a6fa0;
  margin-bottom: 4px;
}

.wta-panel .wta-val {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.wta-panel .wta-sub {
  font-size: 10px;
  color: #5a4f78;
  margin-top: 3px;
}

#wta-pending-d {
  font-size: 14px;
  font-weight: 700;
  color: #f0c040;
  min-height: 1.2em;
  margin-top: 1px;
}

.wta-combo-bar-wrap {
  height: 5px;
  background: #16112a;
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}

.wta-combo-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #5af, #a0f);
  border-radius: 99px;
  width: 0%;
  transition: width 0.1s linear;
}

#wta-abilities {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.wta-chip {
  font-size: 11px;
  padding: 4px 8px;
  background: #16112a;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #ccc;
}

.wta-alevel {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  padding: 1px 5px;
  border-radius: 5px;
}

.wta-dim { color: #4a4060; font-size: 10px; }

#wta-keys {
  font-size: 10px;
  color: #4a4060;
  line-height: 2;
}

#wta-keys b {
  color: #7a6fa0;
}

/* ── Overlay (game over / pause / pick) ── */
#wta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(14, 11, 24, 0.88);
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border-radius: 13px;
}

#wta-overlay.hidden { display: none; }

#wta-overlay h2 {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 4px;
}

.wta-go-score {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #f0c040, #f08040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.wta-overlay-hint {
  font-size: 11px;
  color: #5a4f78;
  margin-top: 4px;
}

/* Ability pick cards */
.wta-pick {
  background: #241e38;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 10px 14px;
  width: 210px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.wta-pick:hover {
  border-color: #7a6fa0;
  transform: scale(1.02);
}

.wta-pick-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.wta-pick-key {
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  background: #7a6fa0;
  border-radius: 6px;
  padding: 1px 6px;
}

.wta-pick-name {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}

.wta-pick-lvl {
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  background: #2a2040;
  border-radius: 5px;
  padding: 1px 5px;
  margin-left: auto;
}

.wta-pick-desc {
  font-size: 11px;
  color: #7a6fa0;
  line-height: 1.4;
}

/* ── Mobile top bar (hidden on desktop) ── */
#wta-topbar { display: none; }

/* ── Mobile layout ── */
@media (pointer: coarse) {
  body {
    align-items: flex-start;
    height: 100dvh;
    overflow: hidden;
  }

  #wta-app {
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    width: 100%;
    height: 100dvh;
    padding: 0;
  }

  /* Hide desktop sidebar */
  #wta-sidebar { display: none; }

  /* ── Top stats bar ── */
  #wta-topbar {
    display: flex;
    flex-shrink: 0;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    background: #120f20;
    border-bottom: 1px solid #241e38;
  }

  .wta-stat-block {
    display: flex;
    flex-direction: column;
    min-width: 0;
    flex-shrink: 0;
  }

  .wta-stat-label {
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5a4f78;
  }

  .wta-stat-val {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  #wta-pending {
    font-size: 11px;
    font-weight: 700;
    color: #f0c040;
    min-height: 14px;
    line-height: 1;
  }

  /* Combo bar under combo value */
  #wta-combo-bar-wrap {
    height: 3px;
    background: #16112a;
    border-radius: 99px;
    margin-top: 3px;
    overflow: hidden;
    width: 100%;
  }

  #wta-combo-bar {
    height: 100%;
    background: linear-gradient(90deg, #5af, #a0f);
    border-radius: 99px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Divider between stat blocks */
  .wta-stat-sep {
    width: 1px;
    height: 32px;
    background: #241e38;
    flex-shrink: 0;
  }

  /* Abilities chips — scrollable, fills remaining space */
  #wta-topbar-abilities {
    flex: 1 1 0;
    display: flex;
    gap: 4px;
    align-items: center;
    min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #wta-topbar-abilities::-webkit-scrollbar { display: none; }

  .wta-chip-sm {
    font-size: 10px;
    padding: 2px 6px;
    background: #241e38;
    border-radius: 6px;
    color: #ccc;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .wta-chip-sm b { color: #f0c040; font-weight: 700; }

  /* Action buttons in top bar */
  .wta-topbar-btn {
    background: #241e38;
    border: none;
    border-radius: 8px;
    color: #ccc;
    font-size: 16px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .wta-topbar-btn:active { background: #3a2a60; }

  #wta-grid-frame::after { display: none; }

  /* ── Grid frame + wrap ── */
  #wta-grid-frame {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-radius: 0;
  }
  #wta-grid-wrap {
    flex: 1 1 0;
    min-height: 0;
    border-radius: 0;
    box-shadow: none;
    overflow: hidden;
    width: 100%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    /*
     * --cell: smaller of width-based and height-based square cell size.
     * Width:  6 cols + 5 inner gaps (3px each) + 2 padding (3px each) = 21px overhead
     * Height: 12 rows + 11 inner gaps + 2 padding = 39px overhead
     *         topbar ≈ 52px
     */
    --cell: min(
      calc((100vw - 21px) / 6),
      calc((100dvh - 52px - 39px) / 12)
    );
  }

  #wta-grid {
    width:  calc(var(--cell) * 6 + 21px);
    height: calc(var(--cell) * 12 + 39px);
    flex-shrink: 0;
  }

  /* Square cells with explicit size */
  .wta-cell {
    width:  var(--cell);
    height: var(--cell);
    border-radius: 15%;
  }

  /* Wider pick cards on mobile */
  .wta-pick {
    width: calc(100vw - 48px);
    max-width: 320px;
  }

  /* Overlay hint on mobile: swipe instruction instead of keyboard */
  .wta-overlay-hint-mobile { display: block; }
  .wta-overlay-hint-desktop { display: none; }
}

@media (pointer: fine) {
  .wta-overlay-hint-mobile { display: none; }
  .wta-overlay-hint-desktop { display: block; }
}
</style>
</head>
<body>
<div id="wta-app">

  <!-- Mobile top stats bar (hidden on desktop via CSS) -->
  <div id="wta-topbar">
    <div class="wta-stat-block">
      <div class="wta-stat-label">Score</div>
      <div class="wta-stat-val" id="wta-score-m">0</div>
      <div id="wta-pending"></div>
    </div>
    <div class="wta-stat-sep"></div>
    <div class="wta-stat-block">
      <div class="wta-stat-label">Lv</div>
      <div class="wta-stat-val" id="wta-level-m">1</div>
    </div>
    <div class="wta-stat-sep"></div>
    <div class="wta-stat-block" id="wta-combo-block-m">
      <div class="wta-stat-label">Combo</div>
      <div class="wta-stat-val" id="wta-combo-m">&mdash;</div>
      <div id="wta-combo-bar-wrap"><div id="wta-combo-bar"></div></div>
    </div>
    <div class="wta-stat-sep"></div>
    <div id="wta-topbar-abilities"><span class="wta-chip-sm" id="wta-abilities-m" style="color:#4a4060">—</span></div>
    <button class="wta-topbar-btn" id="wta-btn-raise" title="Raise row">&#9650;</button>
    <button class="wta-topbar-btn" id="wta-btn-pause" title="Pause">&#9646;&#9646;</button>
    <button class="wta-topbar-btn" id="wta-btn-restart" title="Restart">&#8635;</button>
  </div>

  <!-- Grid -->
  <div id="wta-grid-frame">
    <div id="wta-grid-wrap">
      <div id="wta-grid"></div>
      <div id="wta-cursor" class="hidden"></div>
      <div id="wta-overlay" class="hidden"></div>
    </div>
  </div>

  <!-- Desktop sidebar -->
  <div id="wta-sidebar">
    <div class="wta-panel">
      <h3>Score</h3>
      <div class="wta-val" id="wta-score">0</div>
      <div id="wta-pending-d"></div>
    </div>
    <div class="wta-panel">
      <h3>Level</h3>
      <div class="wta-val" id="wta-level">1</div>
      <div class="wta-sub" id="wta-level-sub"></div>
    </div>
    <div class="wta-panel" id="wta-combo-panel">
      <h3>Combo</h3>
      <div class="wta-val" id="wta-combo">&mdash;</div>
      <div class="wta-combo-bar-wrap"><div class="wta-combo-bar-inner" id="wta-combo-bar-d"></div></div>
    </div>
    <div class="wta-panel">
      <h3>Abilities</h3>
      <div id="wta-abilities"><span class="wta-dim">none yet</span></div>
    </div>
    <div class="wta-panel" id="wta-keys">
      <b>Arrows / WASD</b> move<br>
      <b>Z / Space</b> swap<br>
      <b>X</b> raise row<br>
      <b>P</b> pause<br>
      <b>R</b> restart
    </div>
  </div>

</div>
<script>
const _GAME_COLS = 6; // same on mobile and desktop; mobile uses smaller cells
</script>
<script>
{{SCRIPT}}
new Engine(new WebPlatform()).start();
</script>
</body>
</html>
