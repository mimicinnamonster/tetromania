<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TTY Tetris Attack</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d0d0d;
  color: #eee;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#wta-app {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

#wta-grid-wrap {
  position: relative;
}

#wta-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border: 1px solid #333;
}

#wta-grid.overclock {
  box-shadow: 0 0 24px #f80, 0 0 8px #f80;
}

.wta-cell {
  /* Square cells that fill viewport height */
  width: calc(100vh / 12);
  height: calc(100vh / 12);
  background: #111;
}

.wta-cell[data-color="1"] { background: #c84040; }
.wta-cell[data-color="2"] { background: #40a840; }
.wta-cell[data-color="3"] { background: #3860c0; }
.wta-cell[data-color="4"] { background: #b0a030; }
.wta-cell[data-color="5"] { background: #9040a8; }
.wta-cell[data-color="6"] { background: #30a0a0; }

.wta-cell.falling[data-color="1"] { background: #e86060; }
.wta-cell.falling[data-color="2"] { background: #60c860; }
.wta-cell.falling[data-color="3"] { background: #5878e0; }
.wta-cell.falling[data-color="4"] { background: #d0c050; }
.wta-cell.falling[data-color="5"] { background: #b060c8; }
.wta-cell.falling[data-color="6"] { background: #50c0c0; }

/* Cursor: one unified box — left and right cells share the border */
.wta-cell.cursor-left {
  border-top: 2px solid #fff;
  border-bottom: 2px solid #fff;
  border-left: 2px solid #fff;
}
.wta-cell.cursor-right {
  border-top: 2px solid #fff;
  border-bottom: 2px solid #fff;
  border-right: 2px solid #fff;
}
.wta-cell.cursor-mid {
  border-top: 2px solid #fff;
  border-bottom: 2px solid #fff;
}

@keyframes wta-flash {
  0%,100% { opacity: 1; filter: brightness(2.2); }
  50%     { opacity: 0.25; filter: brightness(0.4); }
}
.wta-cell.clearing {
  animation: wta-flash 0.25s linear infinite;
}

@keyframes wta-rainbow {
  0%   { border-color: #f44; }
  17%  { border-color: #fa4; }
  33%  { border-color: #4f4; }
  50%  { border-color: #4ff; }
  67%  { border-color: #44f; }
  83%  { border-color: #f4f; }
  100% { border-color: #f44; }
}
#wta-grid.combo {
  border: 2px solid #f44;
  animation: wta-rainbow var(--rainbow-period, 0.6s) linear infinite;
}

/* Sidebar */
#wta-sidebar {
  width: 148px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 100vh;
  overflow-y: auto;
}

.wta-panel {
  background: #161616;
  border: 1px solid #2a2a2a;
  padding: 8px 10px;
}

.wta-panel h3 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #555;
  margin-bottom: 5px;
}

.wta-panel .wta-val {
  font-size: 20px;
  font-weight: bold;
  color: #ddd;
}

.wta-panel .wta-sub {
  font-size: 10px;
  color: #444;
  margin-top: 2px;
}

#wta-combo-bar-wrap {
  height: 4px;
  background: #2a2a2a;
  margin-top: 6px;
  overflow: hidden;
}

#wta-combo-bar {
  height: 100%;
  background: #5af;
  width: 0%;
  transition: width 0.1s linear;
}

#wta-abilities {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.wta-chip {
  font-size: 10px;
  padding: 2px 6px;
  background: #1e1e1e;
  border: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

#wta-pending { font-size: 13px; color: #fa4; font-weight: bold; min-height: 1em; margin-top: 2px; }
.wta-alevel { color: #c80; }
.wta-dim { color: #3a3a3a; font-size: 10px; }

#wta-keys {
  font-size: 10px;
  color: #3a3a3a;
  line-height: 1.8;
}

/* Overlay */
#wta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

#wta-overlay.hidden { display: none; }

#wta-overlay h2 {
  font-size: 18px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #ccc;
}

.wta-pick {
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 9px 12px;
  width: 200px;
  cursor: pointer;
}
.wta-pick:hover { border-color: #888; }

.wta-pick-key  { color: #c80; font-size: 12px; font-weight: bold; margin-right: 5px; }
.wta-pick-name { font-size: 13px; font-weight: bold; }
.wta-pick-lvl  { font-size: 9px; color: #c80; margin-top: 2px; }
.wta-pick-desc { font-size: 10px; color: #666; margin-top: 3px; }

.wta-go-score { font-size: 26px; color: #c80; }
</style>
</head>
<body>
<div id="wta-app">
  <div id="wta-grid-wrap">
    <div id="wta-grid"></div>
    <div id="wta-overlay" class="hidden"></div>
  </div>
  <div id="wta-sidebar">
    <div class="wta-panel">
      <h3>Score</h3>
      <div class="wta-val" id="wta-score">0</div>
      <div id="wta-pending"></div>
    </div>
    <div class="wta-panel">
      <h3>Level</h3>
      <div class="wta-val" id="wta-level">1</div>
      <div class="wta-sub" id="wta-level-sub"></div>
    </div>
    <div class="wta-panel">
      <h3>Combo</h3>
      <div class="wta-val" id="wta-combo">&mdash;</div>
      <div id="wta-combo-bar-wrap"><div id="wta-combo-bar"></div></div>
    </div>
    <div class="wta-panel">
      <h3>Abilities</h3>
      <div id="wta-abilities"><span class="wta-dim">none yet</span></div>
    </div>
    <div class="wta-panel" id="wta-keys">
      <b>Arrow / WASD</b> &mdash; move<br>
      <b>Z / Space</b> &mdash; swap<br>
      <b>X</b> &mdash; raise row<br>
      <b>P</b> &mdash; pause<br>
      <b>R</b> &mdash; restart
    </div>
  </div>
</div>
<script>
{{SCRIPT}}
new Engine(new WebPlatform()).start();
</script>
</body>
</html>
